// MOTOR RESOLVER — looks up motor specs from model or diameter
// ─────────────────────────────────────────────────────────────────────────────
// Z-Tech spec sheet confirmed: ALL fans 8–24ft use 2 HP motor.
// FLA @ 480V: 2.65A (8–14ft), 3.5A (16–24ft). Use model lookup — these are fallback estimates only.
const DIA_HP  = {6:0.5,8:2.0,10:2.0,12:2.0,14:2.0,16:2.0,18:2.0,20:2.0,22:2.0,24:2.0};
// FLA @ 460V per diameter (Z-Tech verified values used as fallback)
const DIA_FLA460 = {6:1.6,8:2.65,10:2.65,12:2.65,14:2.65,16:3.5,18:3.5,20:3.5,22:3.5,24:3.5};
const HP_FLA  = {0.5:1.6,0.75:2.2,1.0:2.9,1.5:4.0,2.0:3.5,3.0:4.8,5.0:7.6};

function resolveMotor(bdata, modelName, diameter, voltage) {
  const v = parseInt(voltage) || 460;
  if (bdata?.usesDiameter && diameter) {
    const d = parseInt(diameter);
    const s = bdata.diameterSpecs?.[d];
    if (s) {
      const fla = v >= 400 ? s.fla460 : s.fla460 * 2;
      return { hp:s.hp, fla, circuit:s.circuit, frame:s.frame, source:"diameter" };
    }
  }
  if (modelName && bdata?.models) {
    const m = bdata.models.find(x => x.name === modelName);
    if (m?.hp) {
      const fla = v >= 400 ? (m.fla460 || null) : (m.fla230 || null);
      return { hp:m.hp, fla:fla||0, circuit:m.circuit||"—", frame:m.frame||"—", source:"model", note:m.note };
    }
  }
  if (diameter) {
    const d = parseInt(diameter);
    if (DIA_HP[d]) {
      const hp = DIA_HP[d];
      const fla460 = DIA_FLA460[d] || HP_FLA[hp] || 3.5;
      const fla = v >= 400 ? fla460 : fla460 * 2.2; // rough 460→230V scale
      return { hp, fla: parseFloat(fla.toFixed(2)), circuit:"10A", frame:"143TC", source:"estimated" };
    }
  }
  return null;
}

    steps:["Fan must be running at full operating speed","Clamp around ONE conductor at a time — never multiple wires simultaneously","Clamp U phase → record. Repeat for V and W phases separately","All readings must be below motor nameplate FLA","Phase imbalance >10% = investigate winding resistance on that phase","All phases high = check blade condition, gearbox binding, or over-speed setting"] },
  { label:"Voltage Drop — Panel to VFD", spec:"<3% of supply voltage", tool:"True RMS DMM",
    steps:["Measure voltage AT panel breaker output under running load — record","Measure voltage AT VFD input terminals under same load — record","% Drop = (V-panel – V-vfd) ÷ V-panel × 100","If >3%: wire is undersized for the run length — upsize or shorten run","Z-Tech minimum: 12 AWG stranded. Long runs may need 10 AWG or larger"] },
  { label:"Ground Continuity", spec:"<1Ω — motor frame to panel ground", tool:"Ohmmeter",
    steps:["⚠ LOTO required before testing","Touch probe to motor frame (bare metal — not painted surface)","Touch other probe to panel ground bar","Must read <1Ω — ideally 0.1–0.5Ω","High reading: check ground wire at motor box, VFD PE terminal, and panel ground bar","Z-Tech spec: separate insulated ground conductor from panel to each individual VFD"] },
  { label:"Control Signal (Analog Input)", spec:"0–10V or 4–20mA tracks commanded speed %", tool:"DMM — DC Volts",
    steps:["Set DMM to DC Volts mode","Identify analog input terminals on VFD (typically AIN+ and COM/GND)","Command 0% speed → should read 0V (or 4mA for 4–20mA systems)","Command 50% speed → should read 5V (or 12mA)","Command 100% speed → should read 10V (or 20mA)","Control signal wiring MUST run in separate conduit from all power cables"] },
  { label:"Output Cable Insulation (VFD to Motor)", spec:">1 MΩ phase-to-ground", tool:"Megohmmeter 500VDC",
    steps:["⚠ LOTO + disconnect cable at BOTH VFD output AND motor terminal box","Test each conductor to conduit/ground: U→GND, V→GND, W→GND","Also test phase-to-phase: U→V, V→W, U→W","All readings must be >1 MΩ","<1 MΩ: cable damaged — inspect conduit run for crush points or sharp bends","Z-Tech spec: stranded wire ONLY on VFD output — solid wire will fail over time"] },
  { label:"Terminal Torque Verification", spec:"Blades: 30 ft-lbs ±2 | Mount hardware: 40 ft-lbs min", tool:"Calibrated Torque Wrench",
    steps:["⚠ LOTO required before touching any hardware","VFD power lugs: torque per manufacturer spec (typically 4–6 N·m for 10–14 AWG)","Z-Tech blade hardware: 30 ft-lbs ±2 ft-lbs — verify after first 200 hours","Z-Tech mount hardware (upper/lower yoke): 40 ft-lbs minimum","Wire discoloration at terminals = high resistance → re-torque or replace terminal lug","Guy wire cable clamps: 4.5 ft-lbs minimum"] },
];

  blue:   { border:"#BFDBFE", bg:"#EFF6FF", head:"#1E40AF", badge:"#DBEAFE" },
  red:    { border:"#FECACA", bg:"#FEF2F2", head:"#B91C1C", badge:"#FEE2E2" },
  green:  { border:"#BBF7D0", bg:"#F0FDF4", head:"#15803D", badge:"#DCFCE7" },

// ─────────────────────────────────────────────────────────────────────────────
// SMALL REUSABLE COMPONENTS
// ─────────────────────────────────────────────────────────────────────────────
function FanIcon({ size=32, spin=false }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100"
      style={spin ? { animation:"fanSpin 4s linear infinite", transformOrigin:"50% 50%" } : {}}>
      <circle cx="50" cy="50" r="9" fill="#111"/>
      <circle cx="50" cy="50" r="4" fill="#fff"/>
      {[0,120,240].map(deg => (
        <path key={deg} d="M50 41 C55 28,70 18,73 27 C76 36,60 45,50 50 Z"
          fill="#666" stroke="#111" strokeWidth="1.5" transform={`rotate(${deg} 50 50)`}/>
      ))}
    </svg>
  );
}

function SectionHead({ title, sub }) {
  return (
    <div style={{marginBottom:14}}>
      <div style={{fontWeight:900,fontSize:16,color:T.text}}>{title}</div>
      {sub && <div style={{fontSize:12,color:T.textSub,marginTop:2}}>{sub}</div>}
      <div style={{height:2,background:`linear-gradient(to right,${T.border},transparent)`,marginTop:8,borderRadius:2}}/>
    </div>
  );
}

function SevBadge({ sev }) {
  const m = {
    crit: { bg:T.redBg,    bd:T.redBd,    c:T.red,    l:"CRITICAL" },
    high: { bg:T.orangeBg, bd:T.orangeBd, c:T.orange, l:"HIGH"     },
    med:  { bg:T.yellowBg, bd:T.yellowBd, c:T.yellow, l:"MEDIUM"   },
  };
  const s = m[sev] || m.med;
  return (
    <span style={{background:s.bg,border:`1px solid ${s.bd}`,color:s.c,borderRadius:4,
      padding:"2px 8px",fontSize:10,fontWeight:800,letterSpacing:"0.08em"}}>{s.l}</span>
  );
}

function ManualBtn({ href, label }) {
  return (
    <a href={href} target="_blank" rel="noreferrer"
      style={{display:"inline-flex",alignItems:"center",gap:4,background:T.green,color:"#fff",
        borderRadius:6,padding:"5px 11px",fontSize:11,fontWeight:800,textDecoration:"none",
        marginRight:6,marginBottom:6}}>
      📄 {label}
    </a>
  );
}

const INP = (extra={}) => ({
  width:"100%", boxSizing:"border-box", padding:"9px 11px",
  background:T.surface, border:`1.5px solid ${T.border}`, borderRadius:8,
  fontSize:14, color:T.text, fontFamily:"'Nunito',sans-serif", outline:"none",
  ...extra,
});

const SINP = (extra={}) => INP({ fontSize:13, padding:"7px 9px", ...extra });

// ─────────────────────────────────────────────────────────────────────────────
// SETTINGS PANEL — edit brands, models, faults, field notes
// ─────────────────────────────────────────────────────────────────────────────
function SettingsPanel({ brands, onSave, onClose, onReset }) {
  const [settingsTab, setSettingsTab] = useState("brands");
  const [activeBrand, setActiveBrand] = useState(Object.keys(brands)[0]);
  const [edited, setEdited] = useState(JSON.parse(JSON.stringify(brands)));
  const [newBrandName, setNewBrandName] = useState("");
  const [expandedFault, setExpandedFault] = useState(null);
  const [expandedNote, setExpandedNote] = useState(null);
  const [expandedModel, setExpandedModel] = useState(null);

  const b = edited[activeBrand] || {};

  const updateBrandField = (field, value) => {
    setEdited(p => ({ ...p, [activeBrand]: { ...p[activeBrand], [field]: value } }));
  };

  const updateModel = (i, field, value) => {
    const models = [...(b.models||[])];
    models[i] = { ...models[i], [field]: field==="name"||field==="note"||field==="frame"||field==="circuit" ? value : (value===""?null:parseFloat(value)) };
    updateBrandField("models", models);
  };

  const addModel = () => {
    const models = [...(b.models||[]), { name:"New Model", hp:1.5, fla460:4.0, fla230:8.0, circuit:"10A", frame:"145TC", rpm:1750 }];
    updateBrandField("models", models);
    setExpandedModel(models.length-1);
  };

  const removeModel = (i) => {
    const models = (b.models||[]).filter((_,idx)=>idx!==i);
    updateBrandField("models", models);
    setExpandedModel(null);
  };

  const updateFault = (i, field, value) => {
    const faults = [...(b.faults||[])];
    if (field === "steps") {
      faults[i] = { ...faults[i], steps: value.split("\n").filter(s=>s.trim()) };
    } else {
      faults[i] = { ...faults[i], [field]: value };
    }
    updateBrandField("faults", faults);
  };

  const addFault = () => {
    const faults = [...(b.faults||[]), { code:"NEW", display:"NEW", sev:"med", label:"New Fault", cause:"Describe cause here.", steps:["Step 1","Step 2"] }];
    updateBrandField("faults", faults);
    setExpandedFault(faults.length-1);
  };

  const removeFault = (i) => {
    updateBrandField("faults", (b.faults||[]).filter((_,idx)=>idx!==i));
    setExpandedFault(null);
  };

  const updateNote = (i, field, value) => {
    const notes = [...(b.fieldNotes||[])];
    notes[i] = { ...notes[i], [field]: value };
    updateBrandField("fieldNotes", notes);
  };

  const updateNoteStep = (ni, si, field, value) => {
    const notes = [...(b.fieldNotes||[])];
    const steps = [...(notes[ni].steps||[])];
    steps[si] = { ...steps[si], [field]: value };
    notes[ni] = { ...notes[ni], steps };
    updateBrandField("fieldNotes", notes);
  };

  const addNoteStep = (ni) => {
    const notes = [...(b.fieldNotes||[])];
    notes[ni] = { ...notes[ni], steps:[...(notes[ni].steps||[]), { param:"Param", value:"Value", note:"Description" }] };
    updateBrandField("fieldNotes", notes);
  };

  const removeNoteStep = (ni, si) => {
    const notes = [...(b.fieldNotes||[])];
    notes[ni] = { ...notes[ni], steps: notes[ni].steps.filter((_,idx)=>idx!==si) };
    updateBrandField("fieldNotes", notes);
  };

  const addBrand = () => {
    if (!newBrandName.trim()) return;
    setEdited(p => ({
      ...p,
      [newBrandName]: {
        vfd:"New VFD Type", paramType:"invertek", phone:"1-800-000-0000",
        note:"Enter brand description here.", warningNote:"", website:"",
        usesDiameter:false, manualLinks:[], models:[], faults:[], fieldNotes:[],
      }
    }));
    setActiveBrand(newBrandName);
    setNewBrandName("");
  };

  const removeBrand = (name) => {
    if (!confirm(`Remove "${name}"? This cannot be undone.`)) return;
    const copy = { ...edited };
    delete copy[name];
    setEdited(copy);
    setActiveBrand(Object.keys(copy)[0] || "");
  };

  const sectionBtn = (key, label) => (
    <button onClick={()=>setSettingsTab(key)}
      style={{padding:"7px 14px",background:settingsTab===key?T.accent:T.surface,border:`1.5px solid ${settingsTab===key?T.accent:T.border}`,borderRadius:20,color:settingsTab===key?"#fff":T.textSub,fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>
      {label}
    </button>
  );

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 10px"}}>
      <div style={{background:T.surface,borderRadius:16,width:"100%",maxWidth:700,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        {/* Header */}
        <div style={{background:"#111",borderRadius:"16px 16px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{color:"#fff",fontWeight:900,fontSize:16}}>⚙ Settings</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{ if(confirm("Reset ALL data to factory defaults? This cannot be undone.")) onReset(); }}
              style={{padding:"6px 14px",background:"#B91C1C",border:"none",borderRadius:6,color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>Reset to Default</button>
            <button onClick={()=>onSave(edited)}
              style={{padding:"6px 14px",background:T.green,border:"none",borderRadius:6,color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>💾 Save</button>
            <button onClick={onClose}
              style={{padding:"6px 14px",background:"#444",border:"none",borderRadius:6,color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>✕ Close</button>
          </div>
        </div>

        <div style={{padding:16}}>
          {/* Section tabs */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {sectionBtn("brands","🏭 Brands")}
            {sectionBtn("info","📋 Brand Info")}
            {sectionBtn("models","🔧 Models")}
            {sectionBtn("faults","⚠ Fault Codes")}
            {sectionBtn("notes","📝 Field Notes")}
          </div>

          {/* BRANDS tab */}
          {settingsTab==="brands" && <div>
            <div style={{fontWeight:800,fontSize:14,color:T.text,marginBottom:12}}>Active Manufacturers</div>
            {Object.keys(edited).map(name => (
              <div key={name} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:activeBrand===name?T.accentLt:T.bg,border:`1.5px solid ${activeBrand===name?T.accent:T.border}`,borderRadius:8,marginBottom:6}}>
                <button onClick={()=>{setActiveBrand(name);setSettingsTab("info");}}
                  style={{flex:1,textAlign:"left",background:"none",border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:activeBrand===name?800:600,fontSize:13,color:activeBrand===name?T.accent:T.text}}>
                  {name}
                  <span style={{fontSize:11,color:T.textSub,marginLeft:8}}>{edited[name].vfd}</span>
                </button>
                <button onClick={()=>removeBrand(name)}
                  style={{padding:"4px 10px",background:T.redBg,border:`1px solid ${T.redBd}`,borderRadius:6,color:T.red,fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>Remove</button>
              </div>
            ))}
            <div style={{marginTop:16,padding:"12px",background:T.greenBg,border:`1px solid ${T.greenBd}`,borderRadius:10}}>
              <div style={{fontWeight:800,fontSize:13,color:T.green,marginBottom:8}}>➕ Add New Manufacturer</div>
              <div style={{display:"flex",gap:8}}>
                <input value={newBrandName} onChange={e=>setNewBrandName(e.target.value)} placeholder="e.g. MacroAir" style={{...SINP(),flex:1}}/>
                <button onClick={addBrand} style={{padding:"7px 16px",background:T.green,border:"none",borderRadius:6,color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>Add</button>
              </div>
              <div style={{fontSize:11,color:T.textSub,marginTop:6}}>After adding, go to Brand Info, Models, Faults, and Field Notes to fill in all details.</div>
            </div>
          </div>}

          {/* Brand selector for other tabs */}
          {settingsTab!=="brands" && (
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,fontWeight:800,color:T.textSub,display:"block",marginBottom:4}}>EDITING BRAND</label>
              <select value={activeBrand} onChange={e=>setActiveBrand(e.target.value)} style={{...SINP(),cursor:"pointer"}}>
                {Object.keys(edited).map(n=><option key={n}>{n}</option>)}
              </select>
            </div>
          )}

          {/* BRAND INFO tab */}
          {settingsTab==="info" && b && <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {[["VFD Type","vfd"],["Phone","phone"],["Website","website"],["Parameter Type","paramType"]].map(([label,field])=>(
                <div key={field}>
                  <label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>{label.toUpperCase()}</label>
                  <input value={b[field]||""} onChange={e=>updateBrandField(field,e.target.value)} style={SINP()}/>
                </div>
              ))}
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>BRAND DESCRIPTION / NOTE</label>
              <textarea value={b.note||""} onChange={e=>updateBrandField("note",e.target.value)} rows={3} style={{...SINP(),resize:"vertical"}}/>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>WARNING NOTE (shown in orange — leave blank if none)</label>
              <textarea value={b.warningNote||""} onChange={e=>updateBrandField("warningNote",e.target.value)} rows={2} style={{...SINP(),resize:"vertical"}}/>
            </div>
            <div style={{marginBottom:4}}>
              <label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>USES DIAMETER INPUT (instead of model dropdown)</label>
              <select value={b.usesDiameter?"yes":"no"} onChange={e=>updateBrandField("usesDiameter",e.target.value==="yes")} style={{...SINP(),cursor:"pointer"}}>
                <option value="no">No — use model dropdown</option>
                <option value="yes">Yes — use diameter number input</option>
              </select>
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontWeight:800,fontSize:13,color:T.text,marginBottom:8}}>Manual Links</div>
              {(b.manualLinks||[]).map((link,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                  <input value={link.label} onChange={e=>{const ml=[...b.manualLinks];ml[i]={...ml[i],label:e.target.value};updateBrandField("manualLinks",ml);}} placeholder="Label" style={{...SINP(),flex:"0 0 140px"}}/>
                  <input value={link.url} onChange={e=>{const ml=[...b.manualLinks];ml[i]={...ml[i],url:e.target.value};updateBrandField("manualLinks",ml);}} placeholder="URL" style={{...SINP(),flex:1}}/>
                  <button onClick={()=>updateBrandField("manualLinks",(b.manualLinks||[]).filter((_,idx)=>idx!==i))} style={{padding:"6px 10px",background:T.redBg,border:`1px solid ${T.redBd}`,borderRadius:6,color:T.red,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              ))}
              <button onClick={()=>updateBrandField("manualLinks",[...(b.manualLinks||[]),{label:"",url:""}])}
                style={{padding:"6px 14px",background:T.accentLt,border:`1px solid ${T.accentBd}`,borderRadius:6,color:T.accent,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>+ Add Link</button>
            </div>
          </div>}

          {/* MODELS tab */}
          {settingsTab==="models" && b && <div>
            <div style={{fontSize:12,color:T.textSub,marginBottom:12}}>Edit model names and motor specs. FLA values in Amps. Leave fla460 or fla230 blank if not applicable.</div>
            {(b.models||[]).map((m,i)=>(
              <div key={i} style={{border:`1.5px solid ${expandedModel===i?T.accent:T.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:expandedModel===i?T.accentLt:T.bg,cursor:"pointer"}} onClick={()=>setExpandedModel(expandedModel===i?null:i)}>
                  <span style={{flex:1,fontWeight:700,fontSize:13,color:T.text}}>{m.name}</span>
                  <span style={{fontSize:12,color:T.textSub}}>{m.hp}HP · {m.circuit}</span>
                  <button onClick={e=>{e.stopPropagation();removeModel(i);}} style={{padding:"3px 8px",background:T.redBg,border:`1px solid ${T.redBd}`,borderRadius:4,color:T.red,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:11,cursor:"pointer"}}>Remove</button>
                </div>
                {expandedModel===i && (
                  <div style={{padding:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[["Model Name","name","text"],["Circuit Size","circuit","text"],["HP","hp","number"],["FLA @ 460V","fla460","number"],["FLA @ 230V","fla230","number"],["RPM","rpm","number"],["NEMA Frame","frame","text"],["Note (optional)","note","text"]].map(([label,field,type])=>(
                      <div key={field}>
                        <label style={{fontSize:10,fontWeight:700,color:T.textSub,display:"block",marginBottom:3}}>{label}</label>
                        <input type={type} value={m[field]||""} onChange={e=>updateModel(i,field,e.target.value)} style={SINP()}/>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
            <button onClick={addModel} style={{width:"100%",padding:"10px",background:T.greenBg,border:`1.5px solid ${T.greenBd}`,borderRadius:8,color:T.green,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Add Model</button>
          </div>}

          {/* FAULTS tab */}
          {settingsTab==="faults" && b && <div>
            <div style={{fontSize:12,color:T.textSub,marginBottom:12}}>Edit fault codes, severity, and diagnostic steps. One step per line in the steps field.</div>
            {(b.faults||[]).map((f,i)=>(
              <div key={i} style={{border:`1.5px solid ${expandedFault===i?T.orange:T.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:expandedFault===i?T.orangeBg:T.bg,cursor:"pointer"}} onClick={()=>setExpandedFault(expandedFault===i?null:i)}>
                  <span style={{fontFamily:"monospace",fontWeight:900,fontSize:12,color:T.orange,minWidth:50}}>{f.display}</span>
                  <span style={{flex:1,fontSize:12,color:T.textMid}}>{f.label}</span>
                  <SevBadge sev={f.sev}/>
                  <button onClick={e=>{e.stopPropagation();removeFault(i);}} style={{padding:"3px 8px",background:T.redBg,border:`1px solid ${T.redBd}`,borderRadius:4,color:T.red,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:11,cursor:"pointer"}}>Remove</button>
                </div>
                {expandedFault===i && (
                  <div style={{padding:12}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      {[["Code (internal)","code"],["Display Code","display"],["Short Label","label"]].map(([label,field])=>(
                        <div key={field}>
                          <label style={{fontSize:10,fontWeight:700,color:T.textSub,display:"block",marginBottom:3}}>{label}</label>
                          <input value={f[field]||""} onChange={e=>updateFault(i,field,e.target.value)} style={SINP()}/>
                        </div>
                      ))}
                    </div>
                    <div style={{marginBottom:8}}>
                      <label style={{fontSize:10,fontWeight:700,color:T.textSub,display:"block",marginBottom:3}}>SEVERITY</label>
                      <select value={f.sev} onChange={e=>updateFault(i,"sev",e.target.value)} style={{...SINP(),cursor:"pointer"}}>
                        <option value="crit">CRITICAL</option><option value="high">HIGH</option><option value="med">MEDIUM</option>
                      </select>
                    </div>
                    <div style={{marginBottom:8}}>
                      <label style={{fontSize:10,fontWeight:700,color:T.textSub,display:"block",marginBottom:3}}>ROOT CAUSE</label>
                      <textarea value={f.cause||""} onChange={e=>updateFault(i,"cause",e.target.value)} rows={2} style={{...SINP(),resize:"vertical"}}/>
                    </div>
                    <div>
                      <label style={{fontSize:10,fontWeight:700,color:T.textSub,display:"block",marginBottom:3}}>DIAGNOSTIC STEPS (one per line)</label>
                      <textarea value={(f.steps||[]).join("\n")} onChange={e=>updateFault(i,"steps",e.target.value)} rows={5} style={{...SINP(),resize:"vertical"}}/>
                    </div>
                  </div>
                )}
              </div>
            ))}
            <button onClick={addFault} style={{width:"100%",padding:"10px",background:T.yellowBg,border:`1.5px solid ${T.yellowBd}`,borderRadius:8,color:T.yellow,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Add Fault Code</button>
          </div>}

          {/* FIELD NOTES tab */}
          {settingsTab==="notes" && b && <div>
            <div style={{fontSize:12,color:T.textSub,marginBottom:12}}>Edit field notes sections, procedure steps, and footer text.</div>
            {(b.fieldNotes||[]).map((n,ni)=>(

                  </div>
                )}
              </div>
            ))}
          </div>}
        </div>
      </div>
    </div>
  );
}

  // ── State ──
  const [brands, setBrands] = useState(() => {

  const [oV,setOV]=useState(""); const [oI,setOI]=useState(""); const [oR,setOR]=useState(""); const [oP,setOP]=useState("");
  const [vdV,setVdV]=useState("480"); const [vdA,setVdA]=useState(""); const [vdFt,setVdFt]=useState(""); const [vdAwg,setVdAwg]=useState("12"); const [vdPh,setVdPh]=useState("3");

    setBrands(data);
    try {
      // Try persistent storage first, fall back to localStorage

        window.storage.set(STORAGE_KEY, JSON.stringify(data));
      } else {

      }
    } catch(e) { console.warn("Save failed:", e); }

  }, []);

  // Load from persistent storage on mount
  useEffect(() => {
    const load = async () => {

  useEffect(() => { chatEnd.current?.scrollIntoView({behavior:"smooth"}); }, [aiMsgs]);

  const bdata = brands[brand] || null;
  const faults = bdata?.faults || [];

  // ── Ohm's Law ──
  function solveOhm(field) {
    const v=parseFloat(oV),i=parseFloat(oI),r=parseFloat(oR);
    if(field==="V"&&!isNaN(i)&&!isNaN(r)){setOV((i*r).toFixed(3));setOP((i*i*r).toFixed(2));}
    if(field==="I"&&!isNaN(v)&&!isNaN(r)){setOI((v/r).toFixed(3));setOP((v*v/r).toFixed(2));}
    if(field==="R"&&!isNaN(v)&&!isNaN(i)){setOR((v/i).toFixed(3));setOP((v*i).toFixed(2));}
    if(field==="P"&&!isNaN(v)&&!isNaN(i)){setOP((v*i).toFixed(2));}
  }

  // ── Voltage Drop ──
  function calcVD() {
    const v=parseFloat(vdV),a=parseFloat(vdA),ft=parseFloat(vdFt);
    if(isNaN(v)||isNaN(a)||isNaN(ft)) return null;
    const wire=AWG_DATA.find(w=>w.awg===vdAwg); if(!wire) return null;
    const factor=vdPh==="3"?Math.sqrt(3)*2:2;
    const drop=factor*(wire.ohm/100)*ft*a;
    const pct=(drop/v)*100;
    return {drop:drop.toFixed(2),pct:pct.toFixed(2),ok:pct<=3};
  }

                <div style={{fontSize:11,fontWeight:800,color:T.textSub,letterSpacing:"0.1em",marginBottom:8}}>DIAGNOSTIC STEPS</div>
                {(activeFault.steps||[]).map((s,i)=>{
                  const isWarn = s.startsWith("⚠")||s.startsWith("LOTO")||s.startsWith("NOTE");
                  return (
                    <div key={i} style={{display:"flex",gap:10,marginBottom:9,alignItems:"flex-start"}}>
                      <div style={{background:isWarn?T.red:T.accent,color:"#fff",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0}}>{isWarn?"!":i+1}</div>
                      <div style={{color:isWarn?T.red:T.textMid,fontSize:13,lineHeight:1.6,fontWeight:isWarn?700:400}}>{s}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════════════════════════════════════════
            TAB 2 — ELECTRICAL CHECKS
        ══════════════════════════════════════════════════════════ */}
        {tab===2 && (
          <div>
            <SectionHead title="Electrical Troubleshooting" sub="Tap ✓ to mark done · Tap 'How to Test' for step-by-step"/>
            {ELEC_TESTS.map((item,i)=>(
              <div key={i}>
                <div style={{background:checks[i]?T.greenBg:T.surface,border:`1.5px solid ${checks[i]?T.greenBd:T.border}`,borderRadius:10,padding:"11px 14px",marginBottom:openTest===i?0:8,borderBottomLeftRadius:openTest===i?0:10,borderBottomRightRadius:openTest===i?0:10,borderBottom:openTest===i?"none":""}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div onClick={()=>setChecks(p=>({...p,[i]:!p[i]}))}
                      style={{width:22,height:22,borderRadius:6,flexShrink:0,marginTop:2,border:`2px solid ${checks[i]?T.green:T.borderDk}`,background:checks[i]?T.green:"#fff",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer"}}>
                      {checks[i]?"✓":""}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:checks[i]?T.green:T.text,marginBottom:5}}>{item.label}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                        <span style={{background:T.accentLt,color:T.accent,border:`1px solid ${T.accentBd}`,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700}}>SPEC: {item.spec}</span>
                        <span style={{background:T.bg,color:T.textSub,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700}}>TOOL: {item.tool}</span>
                      </div>
                      <button onClick={()=>setOpenTest(openTest===i?null:i)}
                        style={{background:openTest===i?T.accent:T.bg,border:`1.5px solid ${openTest===i?T.accent:T.border}`,borderRadius:6,padding:"4px 10px",color:openTest===i?"#fff":T.textSub,fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>
                        {openTest===i?"▲ Hide":"▼ How to Test"}
                      </button>
                    </div>
                  </div>
                </div>
                {openTest===i && (
                  <div style={{background:"#1E293B",border:`1.5px solid ${T.accent}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:16,marginBottom:8}}>
                    {item.steps.map((s,si)=>(
                      <div key={si} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                        <div style={{background:s.startsWith("⚠")?"#B91C1C":"#1D4ED8",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0}}>
                          {s.startsWith("⚠")?"!":si+1}
                        </div>
                        <div style={{color:s.startsWith("⚠")?"#FCA5A5":"#CBD5E1",fontSize:12,lineHeight:1.6,fontWeight:s.startsWith("⚠")?700:400}}>{s}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
            <div style={{textAlign:"center",color:T.textSub,fontSize:13,fontWeight:700,padding:"8px 0"}}>
              {Object.values(checks).filter(Boolean).length} / {ELEC_TESTS.length} complete
            </div>
            <button onClick={()=>setChecks({})} style={{width:"100%",padding:10,background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:8,color:T.textSub,fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              ↺ Reset Checklist
            </button>
          </div>
        )}

        {/* ══════════════════════════════════════════════════════════
            TAB 3 — FIELD NOTES
        ══════════════════════════════════════════════════════════ */}
        {tab===3 && (
          <div>
            <SectionHead title="Field Notes" sub={brand?`${brand} — brand-specific wiring and programming procedures`:"Select a brand in Fan Setup to see its field notes"}/>
            {!brand && (
              <div style={{background:T.yellowBg,border:`1px solid ${T.yellowBd}`,borderRadius:8,padding:"12px 14px",color:T.yellow,fontWeight:700,fontSize:13}}>
                💡 Select a manufacturer in Fan Setup to see brand-specific field notes and wiring procedures.
              </div>
            )}
            {brand && (bdata?.fieldNotes||[]).length===0 && (
              <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"12px 14px",color:T.textSub,fontSize:13}}>
                No field notes added yet for {brand}. Go to Settings → Field Notes to add procedures.
              </div>
            )}
            {(bdata?.fieldNotes||[]).map((sec,si)=>{
              const fc = NOTE_COLORS[sec.color] || NOTE_COLORS.blue;
              return (
                <div key={si} style={{background:fc.bg,border:`1.5px solid ${fc.border}`,borderRadius:12,padding:14,marginBottom:14}}>
                  <div style={{marginBottom:10}}>
                    <span style={{background:fc.badge,border:`1px solid ${fc.border}`,borderRadius:20,padding:"3px 14px",fontSize:13,fontWeight:900,color:fc.head}}>{sec.title}</span>
                  </div>
                  {(sec.steps||[]).map((step,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:"rgba(255,255,255,0.8)",borderRadius:8,padding:"9px 10px",border:`1px solid ${fc.border}`,marginBottom:6}}>
                      <div style={{background:fc.head,color:"#fff",borderRadius:6,padding:"3px 10px",fontWeight:900,fontSize:11,flexShrink:0,fontFamily:"monospace",minWidth:90,textAlign:"center"}}>{step.param}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:800,fontSize:13,color:T.text}}>{step.value}</div>
                        {step.note && <div style={{fontSize:12,color:T.textSub,marginTop:2,lineHeight:1.5}}>{step.note}</div>}
                      </div>
                    </div>
                  ))}
                  {sec.footer && (
                    <div style={{marginTop:10,background:"rgba(255,255,255,0.9)",borderRadius:8,padding:"9px 12px",fontSize:12,color:fc.head,fontWeight:700,border:`1px solid ${fc.border}`,lineHeight:1.7}}>
                      {sec.footer}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ══════════════════════════════════════════════════════════
            TAB 4 — CALCULATORS
        ══════════════════════════════════════════════════════════ */}
        {tab===4 && (
          <div>
            <SectionHead title="Field Calculators & Reference" sub="Voltage drop, Ohm's Law, wire ampacity, wiring rules"/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              {["⚡ Voltage Drop","🔢 Ohm's Law","📊 Wire Ampacity","📋 Reference"].map((t,i)=>(
                <button key={i} onClick={()=>setCalcTab(i)}
                  style={{padding:"7px 12px",background:calcTab===i?T.accent:T.surface,border:`1.5px solid ${calcTab===i?T.accent:T.border}`,borderRadius:20,color:calcTab===i?"#fff":T.textSub,fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,cursor:"pointer"}}>
                  {t}
                </button>
              ))}
            </div>

            {/* Voltage Drop */}
            {calcTab===0 && (
              <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
                <div style={{fontWeight:900,fontSize:15,color:T.text,marginBottom:12}}>⚡ Voltage Drop Calculator</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  <div><label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>SUPPLY VOLTAGE (V)</label><input type="number" value={vdV} onChange={e=>setVdV(e.target.value)} style={SINP()}/></div>
                  <div><label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>LOAD CURRENT (A)</label><input type="number" value={vdA} onChange={e=>setVdA(e.target.value)} placeholder="Motor FLA" style={SINP()}/></div>
                  <div><label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>ONE-WAY RUN LENGTH (ft)</label><input type="number" value={vdFt} onChange={e=>setVdFt(e.target.value)} placeholder="e.g. 150" style={SINP()}/></div>
                  <div><label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>WIRE GAUGE</label>
                    <select value={vdAwg} onChange={e=>setVdAwg(e.target.value)} style={{...SINP(),cursor:"pointer"}}>
                      {AWG_DATA.map(w=><option key={w.awg} value={w.awg}>#{w.awg} AWG ({w.mm2} mm²)</option>)}
                    </select></div>
                  <div><label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>PHASE</label>
                    <select value={vdPh} onChange={e=>setVdPh(e.target.value)} style={{...SINP(),cursor:"pointer"}}>
                      <option value="3">3-Phase</option><option value="1">Single Phase</option>
                    </select></div>
                </div>
                {vdResult ? (
                  <div style={{background:vdResult.ok?T.greenBg:T.redBg,border:`1.5px solid ${vdResult.ok?T.greenBd:T.redBd}`,borderRadius:10,padding:"14px 16px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                      <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:700,color:T.textSub}}>VOLTAGE DROP</div><div style={{fontSize:26,fontWeight:900,color:vdResult.ok?T.green:T.red}}>{vdResult.drop} V</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:11,fontWeight:700,color:T.textSub}}>% DROP</div><div style={{fontSize:26,fontWeight:900,color:vdResult.ok?T.green:T.red}}>{vdResult.pct}%</div></div>
                    </div>
                    <div style={{textAlign:"center",fontWeight:800,fontSize:13,color:vdResult.ok?T.green:T.red}}>
                      {vdResult.ok?"✅ ACCEPTABLE — Within NEC 3% guideline":"❌ EXCEEDS 3% — Upsize wire gauge or reduce run length"}
                    </div>
                  </div>
                ) : <div style={{color:T.textSub,fontSize:13,textAlign:"center",padding:12}}>Enter all values above to calculate</div>}
              </div>
            )}

            {/* Ohm's Law */}
            {calcTab===1 && (
              <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
                <div style={{fontWeight:900,fontSize:15,color:T.text,marginBottom:4}}>🔢 Ohm's Law Calculator</div>
                <div style={{fontSize:12,color:T.textSub,marginBottom:14}}>Enter any two known values, then press Solve.</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  {[{label:"VOLTAGE (V) — Volts",val:oV,set:setOV,key:"V"},{label:"CURRENT (I) — Amps",val:oI,set:setOI,key:"I"},{label:"RESISTANCE (R) — Ohms",val:oR,set:setOR,key:"R"},{label:"POWER (P) — Watts",val:oP,set:setOP,key:"P"}].map(f=>(
                    <div key={f.key}>
                      <label style={{fontSize:11,fontWeight:700,color:T.textSub,display:"block",marginBottom:4}}>{f.label}</label>
                      <div style={{display:"flex",gap:6}}>
                        <input type="number" value={f.val} onChange={e=>f.set(e.target.value)} style={{...SINP(),flex:1}}/>
                        <button onClick={()=>solveOhm(f.key)} style={{padding:"7px 10px",background:T.accent,border:"none",borderRadius:6,color:"#fff",fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:800,cursor:"pointer",flexShrink:0}}>Solve</button>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{background:T.accentLt,border:`1px solid ${T.accentBd}`,borderRadius:10,padding:"12px 14px"}}>
                  <div style={{fontWeight:800,fontSize:13,color:T.accent,marginBottom:8}}>Formulas</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    {["V = I × R","I = V ÷ R","R = V ÷ I","P = V × I","P = I² × R","P = V² ÷ R"].map(f=>(
                      <div key={f} style={{background:"#fff",borderRadius:6,padding:"6px 10px",fontFamily:"monospace",fontSize:13,fontWeight:700,color:T.text,border:`1px solid ${T.border}`}}>{f}</div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Wire Ampacity */}
            {calcTab===2 && (
              <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
                <div style={{fontWeight:900,fontSize:15,color:T.text,marginBottom:4}}>📊 NEC Wire Ampacity — Copper in Conduit</div>
                <div style={{fontSize:12,color:T.textSub,marginBottom:12}}>Use 75°C column for VFD/motor circuits. HVLS minimum: 12 AWG stranded.</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:T.accent,color:"#fff"}}>
                      {["AWG","mm²","60°C","75°C","90°C","Ω/100ft"].map(h=><th key={h} style={{padding:"8px 8px",textAlign:"center",fontWeight:800,fontSize:11}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{AWG_DATA.map((w,i)=>(
                      <tr key={w.awg} style={{background:i%2===0?T.bg:"#fff"}}>
                        <td style={{padding:"7px 8px",textAlign:"center",fontWeight:900,color:T.accent,fontFamily:"monospace"}}>{w.awg}</td>
                        <td style={{padding:"7px 8px",textAlign:"center",color:T.textSub}}>{w.mm2}</td>
                        <td style={{padding:"7px 8px",textAlign:"center",color:T.textMid}}>{w.a60}</td>
                        <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:T.text}}>{w.a75}</td>
                        <td style={{padding:"7px 8px",textAlign:"center",color:T.textMid}}>{w.a90}</td>
                        <td style={{padding:"7px 8px",textAlign:"center",color:T.textSub,fontFamily:"monospace"}}>{w.ohm}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
                <div style={{marginTop:10,fontSize:11,color:T.textSub,lineHeight:1.8}}>
                  ⚠ HVLS minimum: 12 AWG stranded (Z-Tech manual). Long runs may need 10 AWG.<br/>
                  ⚠ VFD output: stranded wire ONLY — never solid wire on any VFD output.<br/>
                  ⚠ Max VFD-to-motor: 200ft standard. Over 200ft: upsize cable + consult manufacturer.
                </div>
              </div>
            )}

            {/* Reference */}
            {calcTab===3 && (
              <div>
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16,marginBottom:12}}>
                  <div style={{fontWeight:900,fontSize:14,color:T.text,marginBottom:10}}>📉 Voltage Tolerances & Drop Limits</div>
                  {[{cat:"Branch Circuit (HVLS VFD)",limit:"≤3% drop",note:"NEC 210.19 — panel to VFD"},
                    {cat:"Feeder (panel to subpanel)",limit:"≤2% drop",note:"NEC 215.2 — combined feeder+branch ≤5%"},
                    {cat:"480V 3Ø acceptable range",limit:"432–528V",note:"±10% of nominal"},
                    {cat:"240V 3Ø acceptable range",limit:"216–264V",note:"±10% of nominal"},
                    {cat:"208V 3Ø acceptable range",limit:"187–229V",note:"±10% of nominal"},
                    {cat:"Phase imbalance limit",limit:"<2%",note:">5% will cause motor overheating and VFD faults"},
                    {cat:"VFD-to-motor max run",limit:"200ft",note:"Z-Tech spec — longer requires upsized cable"},
                  ].map((r,i)=>(
                    <div key={i} style={{display:"flex",flexWrap:"wrap",gap:8,padding:"8px 10px",borderRadius:8,background:i%2===0?T.bg:"#fff",marginBottom:4,border:`1px solid ${T.border}`,alignItems:"center"}}>
                      <div style={{flex:"1 1 160px",fontWeight:700,fontSize:12,color:T.text}}>{r.cat}</div>
                      <div style={{background:T.accent,color:"#fff",borderRadius:6,padding:"2px 10px",fontWeight:900,fontSize:12,flexShrink:0}}>{r.limit}</div>
                      <div style={{flex:"2 1 140px",fontSize:11,color:T.textSub}}>{r.note}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
                  <div style={{fontWeight:900,fontSize:14,color:T.text,marginBottom:10}}>🔌 Conduit Wiring Rules (NEC / HVLS)</div>
                  {[
                    ["VFD input conduit","L1+L2+L3 + separate insulated PE ground. Own conduit only."],
                    ["VFD output to motor","U+V+W + ground. Own conduit. Stranded wire ONLY — never solid wire."],
                    ["Multiple fans — input","Different fans' input cables CAN share a conduit."],
                    ["Multiple fans — output","NEVER share output conduit between different fans."],
                    ["Control wiring","0–10V / 4–20mA / RS485 — ALWAYS in separate conduit from power cables."],
                    ["Ground conductor","Separate insulated PE ground from panel to each individual VFD."],
                    ["Input vs output","NEVER run VFD input power and output to motor in the same conduit."],
                  ].map(([rule,desc],i)=>(
                    <div key={i} style={{display:"flex",gap:10,padding:"8px 10px",borderRadius:8,background:i%2===0?T.bg:"#fff",marginBottom:4,border:`1px solid ${T.border}`,alignItems:"flex-start"}}>
                      <div style={{background:T.accentLt,color:T.accent,border:`1px solid ${T.accentBd}`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:800,flexShrink:0,whiteSpace:"nowrap"}}>{rule}</div>
                      <div style={{fontSize:12,color:T.textMid,lineHeight:1.5}}>{desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════════════════════════════════════════
            TAB 5 — AI TECH
        ══════════════════════════════════════════════════════════ */}
        {tab===5 && (
          <div>
            <SectionHead title="AI Field Technician" sub="Ask any HVLS, VFD, wiring, or commissioning question"/>
            <div style={{background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:12,height:380,overflowY:"auto",padding:12,marginBottom:10,display:"flex",flexDirection:"column",gap:10}}>
              {aiMsgs.map((msg,i)=>(
                <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start",gap:8}}>
                  {msg.role==="assistant" && (
                    <div style={{width:30,height:30,background:"#111",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                      <FanIcon size={20}/>
                    </div>
                  )}
                  <div style={{maxWidth:"80%",background:msg.role==="user"?T.accent:T.bg,color:msg.role==="user"?"#fff":T.text,border:msg.role==="assistant"?`1px solid ${T.border}`:"none",borderRadius:msg.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap"}}>
                    {msg.role==="assistant" && <div style={{fontWeight:800,fontSize:10,color:T.textSub,marginBottom:4,letterSpacing:"0.1em"}}>FAN GUYS AI TECH</div>}
                    {msg.content}
                  </div>
                </div>
              ))}
              {aiLoad && (
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{width:30,height:30,background:"#111",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><FanIcon size={20} spin/></div>
                  <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:"14px 14px 14px 4px",padding:"10px 14px"}}>
                    <div style={{fontWeight:800,fontSize:10,color:T.textSub,marginBottom:6,letterSpacing:"0.1em"}}>FAN GUYS AI TECH</div>
                    <div style={{display:"flex",gap:5}}>{[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:T.borderDk,animation:`bounce 1s ease-in-out ${j*0.18}s infinite`}}/>)}</div>
                  </div>
                </div>
              )}
              <div ref={chatEnd}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendAI()}
                placeholder="Fault code, wiring question, commissioning issue…" style={{...INP(),flex:1}}/>
              <button onClick={sendAI} disabled={aiLoad}
                style={{padding:"10px 18px",background:aiLoad?"#9CA3AF":T.accent,border:"none",borderRadius:8,color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:13,cursor:aiLoad?"not-allowed":"pointer"}}>
                Send
              </button>
            </div>
            <div style={{marginTop:10}}>
              <div style={{fontSize:11,fontWeight:800,color:T.textSub,marginBottom:6,letterSpacing:"0.08em"}}>QUICK PROMPTS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {["GFY showing fault 03 on startup","EEF fault after power surge","No FA system — what jumper?","How to set up 5-fan daisy chain","BAF won't reset after fault","Rite-Hite ABB 2001 fault — next steps"].map(q=>(
                  <button key={q} onClick={()=>setAiIn(q)}
                    style={{background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:20,padding:"5px 12px",color:T.textMid,fontFamily:"'Nunito',sans-serif",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* SETTINGS PANEL */}
      {showSettings && (
        <SettingsPanel
          brands={brands}
          onSave={saveData}
          onClose={()=>setShowSettings(false)}
          onReset={()=>{ saveData(JSON.parse(JSON.stringify(DEFAULT_BRANDS))); }}
        />
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
        @keyframes fanSpin { to { transform: rotate(360deg); } }
        @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-5px);opacity:1} }
        select option { background:#fff; color:#111; }
        button:active { transform: scale(0.98); }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:#F3F4F6; }
        ::-webkit-scrollbar-thumb { background:#D1D5DB; border-radius:4px; }
        textarea { font-family: 'Nunito', sans-serif; }
      `}</style>
    </div>
  );
}
