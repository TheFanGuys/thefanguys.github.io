<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Fan Guys — Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080809;
      --bg2:         #0e0f11;
      --surface:     #121316;
      --surface2:    #18191d;
      --border:      rgba(255,255,255,0.07);
      --border-hi:   rgba(255,255,255,0.16);
      --silver:      #b8bec8;
      --silver-dim:  #6b7280;
      --silver-hi:   #dde2ea;
      --white:       #f0f2f5;
      --f-display:   'Barlow Condensed', 'Barlow', sans-serif;
      --f-body:      'Barlow', sans-serif;
      --f-mono:      'JetBrains Mono', monospace;
      --radius-card: 18px;
      --transition:  200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      background: var(--bg);
      color: var(--white);
      font-family: var(--f-body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.022;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient radial */
    body::after {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 70vw;
      max-width: 520px;
      max-height: 520px;
      background: radial-gradient(ellipse at center, rgba(190,200,220,0.045) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 20px env(safe-area-inset-bottom, 24px);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 6px 0;
      height: 52px;
      flex-shrink: 0;
    }

    .status-time {
      font-family: var(--f-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--silver);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--silver);
    }

    /* Hero */
    .hero {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 0 36px;
      opacity: 0;
      transform: translateY(-12px);
      animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .logo-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .fan-mark {
      width: 120px;
      height: 120px;
      filter:
        drop-shadow(0 0 28px rgba(190,200,220,0.32))
        drop-shadow(0 4px 16px rgba(0,0,0,0.85));
    }

    .blade-group {
      transform-origin: 50px 50px;
      animation: fan-spin 2.4s linear infinite;
    }

    .fan-mark:hover .blade-group {
      animation: fan-spin 0.7s linear infinite;
    }

    /* Speed classes set by JS on click */
    .fan-mark.speed-1 .blade-group { animation-duration: 0.55s; }
    .fan-mark.speed-2 .blade-group { animation-duration: 0.38s; }
    .fan-mark.speed-3 .blade-group { animation-duration: 0.22s; }
    .fan-mark.speed-4 .blade-group { animation-duration: 0.10s; }
    .fan-mark.speed-5 .blade-group { animation-duration: 0.04s; }

    @keyframes fan-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .logo-top {
      font-family: var(--f-display);
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(170deg, #ffffff 0%, #dde3ec 28%, #adb6c4 55%, #c8cdd8 72%, #e8ecf2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.9));
    }

    .logo-sub {
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--silver-dim);
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border-hi) 30%, var(--border-hi) 70%, transparent 100%);
      margin: 0 0 28px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.5s forwards;
    }

    /* Section label */
    .section-label {
      width: 100%;
      font-family: var(--f-mono);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--silver-dim);
      padding: 0 4px;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.55s forwards;
    }

    /* Cards */
    .card-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      flex: 1;
    }

    .tool-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 20px 20px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-8px);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.035) 0%, transparent 60%);
      transition:
        background-color var(--transition),
        border-color var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
    }

    .tool-card:nth-child(1) { animation: slideRight 0.45s cubic-bezier(0.22,1,0.36,1) 0.62s forwards; }
    .tool-card:nth-child(2) { animation: slideRight 0.45s cubic-bezier(0.22,1,0.36,1) 0.72s forwards; }
    .tool-card:nth-child(3) { animation: slideRight 0.45s cubic-bezier(0.22,1,0.36,1) 0.82s forwards; }

    /* Shimmer */
    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    /* Left accent bar */
    .tool-card::after {
      content: '';
      position: absolute;
      left: 0;
      top: 16%;
      bottom: 16%;
      width: 2.5px;
      border-radius: 0 2px 2px 0;
      background: linear-gradient(180deg, var(--silver-hi), var(--silver-dim));
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .tool-card:hover,
    .tool-card:focus-visible {
      background-color: var(--surface2);
      border-color: var(--border-hi);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.4);
      transform: translateY(-1px);
      outline: none;
    }

    .tool-card:hover::before { transform: translateX(100%); }
    .tool-card:hover::after  { opacity: 1; }

    .tool-card:active {
      transform: scale(0.985);
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      border-color: var(--border);
    }

    .card-icon {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
    }

    .tool-card:hover .card-icon {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.14);
    }

    .card-icon svg {
      color: var(--silver);
      transition: color var(--transition);
    }

    .tool-card:hover .card-icon svg { color: var(--silver-hi); }

    .card-text { flex: 1; min-width: 0; }

    .card-title {
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.15;
      transition: color var(--transition);
    }

    .tool-card:hover .card-title { color: #ffffff; }

    .card-meta {
      font-family: var(--f-mono);
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--silver-dim);
      margin-top: 3px;
      transition: color var(--transition);
    }

    .tool-card:hover .card-meta { color: #8892a0; }

    .card-arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--silver-dim);
      transition: color var(--transition), transform var(--transition);
    }

    .tool-card:hover .card-arrow {
      color: var(--silver-hi);
      transform: translateX(3px);
    }

    /* Footer */
    .footer {
      padding: 36px 0 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.0s forwards;
    }

    .footer-dots { display: flex; gap: 5px; }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--silver-dim);
      opacity: 0.4;
    }

    .footer-text {
      font-family: var(--f-mono);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--silver-dim);
      opacity: 0.45;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .tool-card:focus-visible {
      outline: 2px solid rgba(180,190,210,0.4);
      outline-offset: 2px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>

<body>
  <div class="shell">

    <!-- Status Bar -->
    <div class="status-bar" aria-hidden="true">
      <span class="status-time" id="js-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
          <rect x="0" y="7" width="3" height="5" rx="0.8" fill="currentColor" opacity="0.4"/>
          <rect x="4.5" y="5" width="3" height="7" rx="0.8" fill="currentColor" opacity="0.6"/>
          <rect x="9" y="2.5" width="3" height="9.5" rx="0.8" fill="currentColor" opacity="0.8"/>
          <rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="currentColor"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="currentColor"/>
          <path d="M3.8 6.4a6 6 0 0 1 8.4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M1 3.6a10 10 0 0 1 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.3" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          <rect x="22.5" y="3.5" width="2" height="5" rx="1.2" fill="currentColor" opacity="0.4"/>
          <rect x="2" y="2" width="15" height="8" rx="1.8" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Hero -->
    <header class="hero">
      <div class="logo-lockup">

        <!-- 5-blade fan — each blade is a single shape rotated 72° apart -->
        <svg class="fan-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <!-- Single blade gradient: bright leading edge, dark trailing -->
            <linearGradient id="blade-g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#f0f3f8"/>
              <stop offset="35%"  stop-color="#c4cad5"/>
              <stop offset="70%"  stop-color="#8a929f"/>
              <stop offset="100%" stop-color="#5a6270"/>
            </linearGradient>
            <!-- Darker underside for depth -->
            <linearGradient id="blade-g2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#d8dde8"/>
              <stop offset="50%"  stop-color="#9098a8"/>
              <stop offset="100%" stop-color="#4e5766"/>
            </linearGradient>
            <!-- Hub radial gradient -->
            <radialGradient id="hub-rg" cx="38%" cy="32%" r="65%">
              <stop offset="0%"   stop-color="#e8ecf3"/>
              <stop offset="45%"  stop-color="#9aa3b2"/>
              <stop offset="100%" stop-color="#3a4050"/>
            </radialGradient>
            <!-- Blade glow/shadow filter -->
            <filter id="blade-fx" x="-15%" y="-15%" width="130%" height="130%">
              <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
            </filter>
            <!-- Hub filter -->
            <filter id="hub-fx" x="-40%" y="-40%" width="180%" height="180%">
              <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.7"/>
            </filter>
          </defs>

          <!--
            Single blade shape (pointing UP from center, swept clockwise):
            - Root attaches at center (50,50)
            - Blade sweeps up and curves right (aerodynamic camber)
            - Width ~18px at root, tapers to a rounded tip
            Each subsequent blade is this same path rotated 72° around (50,50)
          -->

          <g class="blade-group" filter="url(#blade-fx)">
            <!-- Blade 1 — 0° -->
            <path transform="rotate(0 50 50)"
              d="M 50 50
                 C 43 48, 38 36, 40 18
                 C 41 8,  50 4,  55 10
                 C 60 16, 58 30, 57 42
                 C 56 46, 54 49, 50 50 Z"
              fill="url(#blade-g)"/>

            <!-- Blade 2 — 72° -->
            <path transform="rotate(72 50 50)"
              d="M 50 50
                 C 43 48, 38 36, 40 18
                 C 41 8,  50 4,  55 10
                 C 60 16, 58 30, 57 42
                 C 56 46, 54 49, 50 50 Z"
              fill="url(#blade-g2)"/>

            <!-- Blade 3 — 144° -->
            <path transform="rotate(144 50 50)"
              d="M 50 50
                 C 43 48, 38 36, 40 18
                 C 41 8,  50 4,  55 10
                 C 60 16, 58 30, 57 42
                 C 56 46, 54 49, 50 50 Z"
              fill="url(#blade-g)"/>

            <!-- Blade 4 — 216° -->
            <path transform="rotate(216 50 50)"
              d="M 50 50
                 C 43 48, 38 36, 40 18
                 C 41 8,  50 4,  55 10
                 C 60 16, 58 30, 57 42
                 C 56 46, 54 49, 50 50 Z"
              fill="url(#blade-g2)"/>

            <!-- Blade 5 — 288° -->
            <path transform="rotate(288 50 50)"
              d="M 50 50
                 C 43 48, 38 36, 40 18
                 C 41 8,  50 4,  55 10
                 C 60 16, 58 30, 57 42
                 C 56 46, 54 49, 50 50 Z"
              fill="url(#blade-g)"/>
          </g>

          <!-- Hub cap — sits on top of all blades -->
          <circle cx="50" cy="50" r="10" fill="url(#hub-rg)" filter="url(#hub-fx)"/>
          <circle cx="50" cy="50" r="10" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
          <circle cx="50" cy="50" r="4.5" fill="#14151a"/>
          <!-- Specular highlight on hub -->
          <ellipse cx="47.5" cy="46.5" rx="2.2" ry="1.4" fill="rgba(255,255,255,0.32)" transform="rotate(-20 47.5 46.5)"/>
        </svg>

        <div class="logo-wordmark">
          <span class="logo-top">Fan Guys</span>
          <span class="logo-sub">Internal Tools</span>
        </div>
      </div>
    </header>

    <div class="divider" aria-hidden="true"></div>
    <p class="section-label">Applications</p>

    <!-- Tool Cards -->
    <nav class="card-stack" role="navigation" aria-label="Tool Applications">

      <a class="tool-card" href="https://thefanguys.github.io/Estimator/" target="_blank" rel="noopener" aria-label="Open The Estimator">
        <div class="card-icon" aria-hidden="true">

            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div class="card-text">
          <div class="card-title">The Estimator</div>
          <div class="card-meta">Job costing &amp; quotes</div>
        </div>
        <div class="card-arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

      <a class="tool-card" href="https://thefanguys.github.io/Site-Survey/" target="_blank" rel="noopener" aria-label="Open Site Survey">
        <div class="card-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="card-text">
          <div class="card-title">Site Survey</div>
          <div class="card-meta">Field data capture</div>
        </div>
        <div class="card-arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

      <a class="tool-card" href="https://thefanguys.github.io/tech-pro/" target="_blank" rel="noopener" aria-label="Open Tech Pro Field Service">
        <div class="card-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <div class="card-text">
          <div class="card-title">Tech Pro Field Service</div>
          <div class="card-meta">Technician workflow</div>
        </div>
        <div class="card-arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

    </nav>

    <footer class="footer" role="contentinfo">
      <div class="footer-dots" aria-hidden="true">
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
      </div>
      <p class="footer-text">Fan Guys &nbsp;&middot;&nbsp; Internal Tools Portal</p>
    </footer>

  </div>

  <script>
    // Clock
    function updateTime() {
      var el = document.getElementById('js-time');
      if (!el) return;
      var now = new Date();
      var h = now.getHours();
      var m = String(now.getMinutes()).padStart(2, '0');
      el.textContent = h + ':' + m;
    }
    updateTime();
    setInterval(updateTime, 10000);

    // Fan speed on tap/click — cycles through 5 speeds then resets
    (function() {
      var fan = document.querySelector('.fan-mark');
      if (!fan) return;
      var level = 0;
      var maxLevel = 5;
      var resetTimer = null;

      fan.style.cursor = 'pointer';

      fan.addEventListener('click', function() {
        // Cancel any pending reset
        clearTimeout(resetTimer);

        // Advance speed level (cap at max)
        level = Math.min(level + 1, maxLevel);

        // Remove all speed classes, apply current
        for (var i = 1; i <= maxLevel; i++) {
          fan.classList.remove('speed-' + i);
        }
        fan.classList.add('speed-' + level);

        // Auto-slow back to idle after 3 seconds of no taps
        resetTimer = setTimeout(function() {
          for (var i = 1; i <= maxLevel; i++) {
            fan.classList.remove('speed-' + i);
          }
          level = 0;
        }, 3000);
      });
    })();
  </script>
</body>
</html>
